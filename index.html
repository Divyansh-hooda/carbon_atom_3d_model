<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="view port" content="width=device-width, initial-scale=1.0">
        <title> carbon element visualisation</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
        <style>
            :root{
                --graphite-0:#141311;
                --graphite-1:#1f1d1a;
                --graphite-2:#2b2824;
                --paper:#ece6d9;
                --paper-dim:#a89f8d;
                --proton:#e0663f;
                --nuetron:#7f8a8c;
                --electron:#5fd6c4;
                --eleceton-glow:#5fd6c4;
                --diamond:#cfeaf0;
                --rule: rgba(326,230,217,0.14);
            }
            *{box-sizing:border-box}
            html,body{margin:0;padding:0;}
            body{
                background:var(--graphite-0);
                background-image:
                    radial-gradient(ellipse at 20% -10%, rgba(95,214,196,0.06), transparent 55%),
                    radial-gradient(ellipse at 100% 110%, rgba(224,102,63,0.05), transparent 50%);
                color:var(--paper);
                font-family:'spectral', serif;
                -webkit-font-smoothing:antialiased;
            }
            @media (prefers-reduced-motion:reduce){
                *{animation-duration:0.001ms !important; animation-iteration-count:1 !important;}
            }
            .mono{font-family:'IBM Plex Mono', monospace;}
            header.hero{
                max-width:1100px;
                margin:0 auto;
                padding:6vh 24px 3vh;
                display: flex;
                flex-wrap: wrap;
                align-items: flex-end;
                justify-items: space-between;
                gap: 24px;
                border-bottom: 1px solid var(--rule);
            }
            .eyebrow{
                font-family: 'ibm plex mono',monospace;
                letter-spacing: 0.18em;
                text-transform:uppercase;
                font-size:12px;
                color: var(--electron);
                margin: 0 0 14px;
            }
            h1.symbol.title{
                font-size: clamp(64px, 11vw,132px);
                line-height: 0.85;
                margin: 0;
                font-weight: 600;
                letter-spacing: -0.01em;
                color: var(--paper);
            }
            h1.symbol-title em{
                font-style: normal;
                color: var(--proton);
            }
            .tagline{
                max-width: 360px;
                font-size: 16px;
                line-height: 1.6;
                color: var(--paper-dim);
                font-style: italic;
            }
            .stat-card{
                font-family: 'ibm plex mono', monospace;
                font-size: 12px;
                color: var(--paper-dim);
                text-align: right;
            }
            .stat-card .big{
                display: block;
                font-size: 44px;
                color: var(--paper);
                line-height: 1;
                margin-bottom: 6px;
            }
            main{
                max-width: 1100px;
                margin: 0 auto;
                padding: 0 24px;
            }
            .stage{
                position: relative;
                display: flex;
                justify-content: center;
                padding: 6vh 0 1vh;
            }
            .stage svg{
                width: min(560px, 90vh);
                height: auto;
                overflow: visible;
                cursor: grab;
                touch-action: none;
            }
            .stage svg.dragging{cursor: grabbing;}
            .shell-ring{
                fill: none;
                stroke: var(--rule);
                stroke-width: 1;
                stroke-dasharray: 2 5;
            }
            .orbit-group{
                transform-origin: 300px 300px;
            }
            .orbit-1{animation:spin 9s linear infinite;}
            .orbit-2{animation: spin 16s linear infinite reverse;}
            .dragging .orbit-1, .dragging .orbit-2{animation-play-state: running;}
            @keyframes spin{to{transform: rotate(360deg);}}

            .particle{cursor: pointer;}
            .particle:focus-visible circle{
                stroke: var(--paper);
                stroke-width: 2;
            }
            .electron circle{
                fill:var(--eleceton);
                filter: drop-shadow(0 0 6px var(--diamond));
            }
            .nucleon circle{
                stroke:var(--graphite-0);
                stroke-width:1.5;
            }
            .nucleon.selected circle{
                stroke:var(--paper);
                stroke-width:2.5;
            }
            .proton circle{ fill:var(--proton); }
            .neutron circle{ fill:var(--neutron); }

            .label-tip{
                font-family:'IBM Plex Mono', monospace;
                font-size:11px;
                fill:var(--paper-dim);
                text-anchor:middle;
            }
            .hint{
                text-align:center;
                font-family:'IBM Plex Mono', monospace;
                font-size:11px;
                color:var(--paper-dim);
                letter-spacing:0.04em;
                margin:0 0 3vh;
            }
            .info-panel{
                max-width:520px;
                margin:0 auto 4vh;
                padding:18px 22px;
                background:var(--graphite-1);
                border:1px solid var(--rule);
                border-left:3px solid var(--electron);
                min-height:64px;
                transition:border-color .2s ease;
            }
            .info-panel h3{
                margin:0 0 6px;
                font-size: 15px;
                font-family: 'ibm plex mono', monospace;
                color: var(--paper);
                letter-spacing: 0.02em;
            }
            .info-panel p{
                margin:0;
                font-size: 14px;
                line-height: 1.55;
                color: var(--paper-dim);
            }

            .controls{
                display:flex;
                justify-content: center;
                gap:10px;
                flex-wrap: wrap;
                margin: 0 0 2.5vh;
            }
            .chip{
                font-family: 'ibm plex mono', monospace;
                font-size: 12px;
                letter-spacing: 0.04em;
                padding: 8px 14px;
                border-radius: 100px;
                background: transparent;
                color: var(--paper-dim);
                cursor: pointer;
                transition: all .2s ease;
            }
            .chip.active{
                color: var(--graphite-0);
                background: var(--eleceton);
                border-color: var(--electron);
            }
            .chip:hover:not(.active){
                border-color: var(--paper-dim);
                color: var(--paper);
            }
            .chip:disabled{
                opacity: 0.35;
                cursor: not-allowed;
            }
            .ion-panel{
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 16px;
                flex-wrap: wrap;
                margin: 0 0 5vh;
            }
            .ion-btn{
                font-family: 'ibm plex mono', monospace;
                font-size: 16px;
                width: 36px; height: 36px;
                border-radius: 50%;
                border: 1px solid var(--paper-dim);
                background: transparent;
                color: var(--paper);
                cursor: pointer;
                line-height: 1;
                transition: all .15s ease;
            }
            .ion-btn:hover:not(:disabled){
                background: var(--paper);
                color: var(--graphite-0);
            }
            .ion-btn:disabled{opacity: 0.3; cursor: not-allowed;}
            .charge-readout{
                font-family: 'ibm plex mono', monospace;
                font-size: 13px;
                color: var(--paper-dim);
                min-width: 220px;
                text-align: center;
            }
            .charge-readout .charge-val{
                font-size: 20px;
                color: var(--paper);
                display: block;
                margin-bottom: 2px;
            }
            .ion-reset{
                font-family: 'ibm plex mono', monospace;
                font-size: 11px;
                text-decoration: underline;
                background: none;
                border: none;
                color: var(--paper-dim);
                cursor: pointer;
            }
            .ion-reset:hover{ color: var(--paper);}
            .config-strip{
                border-top: 1px solod var(--rule);
                border-bottom: 1px solid var(--rule);
                padding: 28px 0;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 18px;
                flex-wrap: wrap;
                font-family: 'ibm plex mono', monospace;
            }
            .config-strip .seg{
                font-size: clamp(20px, 4vh, 30px);
                color: var(--paper);
            }
            .config-strip .seg sup{
                color: var(--eleceton);
                font-size: 0.55em;
            }
            .config-strip .divider{color: var(--rule);}
            .facts{
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1px;
                background: var(--rule);
                margin: 6vh 0;
                border: 1px solid var(--rule);
            }
            .fact{
                background: var(--graphite-1);
                padding: 26px 22px;
            }
            .fact .num{
                font-family: 'ibm plex mono', monospace;
                font-size: 11px;
                color: var(--paper-dim);
                display: block;
                margin-bottom: 10px;
            }
            .fact h3{
                margin: 0 0 8px;
                font-size: 18px;
                font-weight: 600;
                color: var(--paper);
            }
        </style>
    </head>
</html>
