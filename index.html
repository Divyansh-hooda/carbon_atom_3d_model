<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="view port" content="width=device-width, initial-scale=1.0">
        <title> carbon element visualisation</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
        <style>
            :root{
                --graphite-0:#141311;
                --graphite-1:#1f1d1a;
                --graphite-2:#2b2824;
                --paper:#ece6d9;
                --paper-dim:#a89f8d;
                --proton:#e0663f;
                --nuetron:#7f8a8c;
                --electron:#5fd6c4;
                --eleceton-glow:#5fd6c4;
                --diamond:#cfeaf0;
                --rule: rgba(326,230,217,0.14);
            }
            *{box-sizing:border-box}
            html,body{margin:0;padding:0;}
            body{
                background:var(--graphite-0);
                background-image:
                    radial-gradient(ellipse at 20% -10%, rgba(95,214,196,0.06), transparent 55%),
                    radial-gradient(ellipse at 100% 110%, rgba(224,102,63,0.05), transparent 50%);
                color:var(--paper);
                font-family:'spectral', serif;
                -webkit-font-smoothing:antialiased;
            }
            @media (prefers-reduced-motion:reduce){
                *{animation-duration:0.001ms !important; animation-iteration-count:1 !important;}
            }
            .mono{font-family:'IBM Plex Mono', monospace;}
            header.hero{
                max-width:1100px;
                margin:0 auto;
                padding:6vh 24px 3vh;
                display: flex;
                flex-wrap: wrap;
                align-items: flex-end;
                justify-items: space-between;
                gap: 24px;
                border-bottom: 1px solid var(--rule);
            }
            .eyebrow{
                font-family: 'ibm plex mono',monospace;
                letter-spacing: 0.18em;
                text-transform:uppercase;
                font-size:12px;
                color: var(--electron);
                margin: 0 0 14px;
            }
            h1.symbol.title{
                font-size: clamp(64px, 11vw,132px);
                line-height: 0.85;
                margin: 0;
                font-weight: 600;
                letter-spacing: -0.01em;
                color: var(--paper);
            }
            h1.symbol-title em{
                font-style: normal;
                color: var(--proton);
            }
            .tagline{
                max-width: 360px;
                font-size: 16px;
                line-height: 1.6;
                color: var(--paper-dim);
                font-style: italic;
            }
            .stat-card{
                font-family: 'ibm plex mono', monospace;
                font-size: 12px;
                color: var(--paper-dim);
                text-align: right;
            }
            .stat-card .big{
                display: block;
                font-size: 44px;
                color: var(--paper);
                line-height: 1;
                margin-bottom: 6px;
            }
        </style>
    </head>
</html>
